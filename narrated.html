<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>We Were Here — Narrated Photographs</title>
<style>
  :root{--aubergine:#2E1A47;--purple:#512A80;--gold:#C9A24B;--offwhite:#F5F2FA;--lavender:#BEB0D6;--line:rgba(190,176,214,.28);}
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:transparent;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--offwhite);}
  .wrap{max-width:920px;margin:0 auto;padding:0;}
  .card{background:linear-gradient(160deg,#341d55,#241238);border:1px solid var(--line);border-radius:16px;overflow:hidden;box-shadow:0 10px 34px rgba(0,0,0,.32);}
  .bar{display:flex;align-items:center;gap:12px;padding:13px 18px;border-bottom:1px solid var(--line);}
  .bar .eyebrow{font-size:.7rem;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin:0;}
  .bar .title{font-family:Georgia,"Times New Roman",serif;font-size:1.12rem;margin:2px 0 0;color:var(--offwhite);}
  .bar .shuffle{margin-left:auto;display:inline-flex;align-items:center;gap:7px;font-size:.72rem;color:var(--lavender);border:1px solid var(--line);border-radius:20px;padding:6px 13px;background:rgba(201,162,75,.08);white-space:nowrap;}
  .bar .shuffle svg{width:15px;height:15px;fill:var(--gold);}
  .stage{position:relative;width:100%;aspect-ratio:16/9;background:#1c1030;}
  .stage iframe,.stage #ytplayer{position:absolute;inset:0;width:100%;height:100%;border:0;}
  .foot{padding:11px 18px;font-size:.8rem;color:var(--lavender);border-top:1px solid var(--line);line-height:1.4;}
  .foot b{color:var(--offwhite);font-weight:600;}
  @media (max-width:520px){ .bar .title{font-size:1rem} .bar{padding:11px 14px} .foot{padding:10px 14px;font-size:.76rem} }
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="bar">
      <div>
        <p class="eyebrow">Narrated Photographs</p>
      </div>

    </div>
    <div class="stage"><div id="ytplayer"></div></div>
  </div>
</div>

  var player;
  function onYouTubeIframeAPIReady(){
    player=new YT.Player('ytplayer',{

  }
  // Report the card's exact height to a hosting page so it can size the iframe
  // precisely (no letterboxing / clipping at any width). Height only — non-sensitive.
  function reportHeight(){
    try{
      var c=document.querySelector('.card');
      var h=c?Math.ceil(c.getBoundingClientRect().height):document.body.scrollHeight;
      if(window.parent && window.parent!==window){ window.parent.postMessage({wwhNarratedHeight:h},"*"); }
    }catch(e){}
  }
  window.addEventListener("load",reportHeight);
  window.addEventListener("resize",function(){ clearTimeout(window.__rt); window.__rt=setTimeout(reportHeight,150); });
  setTimeout(reportHeight,300); setTimeout(reportHeight,1200);
  // If this page is restored from the browser's back/forward cache — Safari and
  // Firefox keep the frozen, still-"playing" YouTube frame even though omeka.net
  // sends Cache-Control:no-store, so the restored player can pop into fullscreen
  // when you hit Back — reload it so it returns fresh, inline, paused, reshuffled.
  window.addEventListener("pageshow",function(e){ if(e.persisted){ location.reload(); } });

</html>
